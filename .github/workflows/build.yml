name: Build project

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Adult datasets
        run: |
          mkdir -p data/raw
          curl -o data/raw/adult.data https://archive.ics.uci.edu/ml/machine-learning-databases/adult/adult.data
          curl -o data/raw/adult.test https://archive.ics.uci.edu/ml/machine-learning-databases/adult/adult.test

      - name: Train and save models
        run: |
          python src/main.py

      - name: Model tests
        id: tests
        run: |
          mkdir -p model-test-results
          PYTHONPATH=src pytest model_tests/ --capture=tee-sys --cov=model --cov=evaluate --cov=data_loader --cov-report=term --cov-report=html --junitxml=test-results/results.xml > model-test-results/results.log
        continue-on-error: true

  release:
    needs: build-and-test
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - name: Generate evidences
        run: |
          mkdir -p release

          touch release/execution-evidences.txt

          echo "Autor: ${{ github.actor }}" >> execution-evidences.txt
          echo "Commit: ${{ github.sha }}" >> execution-evidences.txt
          echo "Fecha: $(date)" >> info.txt

      - name: Generate tag with release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            models/model.pkl
            models/scaler.pkl
            models/encoders.pkl
            releases/execution-evidences.txt
          tag_name: -${{ github.run_number }}
          body: |
            Model trained on ${{ github.event.head_commit.timestamp }} by ${{ github.event.head_commit.author.name }}"
          draft: false
          prerelease: false
